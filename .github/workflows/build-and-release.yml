name: Build and Release

on:
  pull_request:
    paths-ignore:
      - 'ota/**'
      - '**/*.md'
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
      - 'V*'
    paths-ignore:
      - 'ota/**'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      prerelease_tag:
        description: 'Preview release tag. Leave empty for nightly-YYYYMMDD (Asia/Shanghai).'
        required: false
        type: string
      publish_release:
        description: 'Publish the preview pre-release (compares last formal release -> current commit).'
        required: false
        default: true
        type: boolean

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.plan.outputs.should_build }}
      should_publish_release: ${{ steps.plan.outputs.should_publish_release }}
      release_type: ${{ steps.plan.outputs.release_type }}
      is_prerelease: ${{ steps.plan.outputs.is_prerelease }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      release_name: ${{ steps.plan.outputs.release_name }}
      release_label: ${{ steps.plan.outputs.release_label }}
      release_date: ${{ steps.plan.outputs.release_date }}
      release_guidance: ${{ steps.plan.outputs.release_guidance }}
      build_version: ${{ steps.plan.outputs.build_version }}
      target_commitish: ${{ steps.plan.outputs.target_commitish }}
      target_branch: ${{ steps.plan.outputs.target_branch }}
      previous_stable_tag: ${{ steps.plan.outputs.previous_stable_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release plan
        id: plan
        shell: bash
        env:
          MANUAL_PRERELEASE_TAG: ${{ github.event.inputs.prerelease_tag || '' }}
          MANUAL_PUBLISH: ${{ github.event.inputs.publish_release || 'false' }}
        run: |
          set -euo pipefail

          {
            echo "should_build=false"
            echo "should_publish_release=false"
            echo "release_type=none"
            echo "is_prerelease=false"
            echo "release_tag="
            echo "release_name="
            echo "release_label="
            echo "release_date=$(TZ=Asia/Shanghai date +%F)"
            echo "release_guidance="
            echo "build_version="
            echo "target_commitish=${GITHUB_SHA}"
            echo "target_branch=main"
            echo "previous_stable_tag="
          } >> "$GITHUB_OUTPUT"

          has_effective_changes() {
            local sha="$1"
            if git show --pretty="" --name-only "$sha" | grep -Ev '^(ota/|.*\.md$)' | grep -q .; then
              return 0
            fi

            return 1
          }

          # Latest formal-release tag (v*/V*) reachable from the built commit.
          # The preview compares this tag -> the current commit ("all changes since the last formal release").
          latest_stable_tag=$(git tag --list 'v*' 'V*' --sort=-v:refname --merged "${GITHUB_SHA}" | head -n1 || true)

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${MANUAL_PUBLISH}" == "true" ]]; then
            today=$(TZ=Asia/Shanghai date +%Y%m%d)
            release_tag="${MANUAL_PRERELEASE_TAG:-nightly-$today}"

            {
              echo "should_build=true"
              echo "should_publish_release=true"
              echo "release_type=prerelease"
              echo "is_prerelease=true"
              echo "release_tag=$release_tag"
              echo "release_name=Pre-release $release_tag"
              echo "release_label=pre-release"
              echo "release_guidance=This is a preview pre-release covering all changes since the last formal release. Make it clear that details may still change and do not phrase it as a final stability promise."
              echo "build_version=$release_tag"
              echo "release_date=$(TZ=Asia/Shanghai date +%F)"
              echo "target_commitish=${GITHUB_SHA}"
              echo "target_branch=${GITHUB_REF_NAME}"
              echo "previous_stable_tag=$latest_stable_tag"
            } >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            if has_effective_changes "${GITHUB_SHA}"; then
              normalized_tag="${GITHUB_REF_NAME#v}"
              normalized_tag="${normalized_tag#V}"
              {
                echo "should_build=true"
                echo "should_publish_release=true"
                echo "release_type=stable"
                echo "is_prerelease=false"
                echo "release_tag=${GITHUB_REF_NAME}"
                echo "release_name=${GITHUB_REF_NAME}"
                echo "release_label=formal release"
                echo "release_guidance=This is a formal release. Emphasize stable delivery and user-visible changes, but only state facts supported by the commit data."
                echo "build_version=$normalized_tag"
              } >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_build == 'true'
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Wails CLI and go-winres
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          go install github.com/tc-hib/go-winres@latest
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $env:USERPROFILE 'go\bin')

      - name: Ensure NSIS
        shell: pwsh
        run: |
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y --no-progress
          }
          $nsisPath = 'C:\Program Files (x86)\NSIS'
          if (Test-Path $nsisPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $nsisPath
          }

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            C:\Users\runneradmin\.bun\install\cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/package.json', 'frontend/bun.lock', 'frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Build TempBridge
        shell: cmd
        run: build_bridge.bat

      - name: Build THRM
        shell: cmd
        env:
          THRM_BUILD_VERSION: ${{ needs.prepare-release.outputs.build_version }}
        run: build.bat

      - name: Collect release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/output | Out-Null
          Copy-Item build/bin/THRM.exe build/output/THRM.exe
          Copy-Item 'build/bin/THRM Core.exe' 'build/output/THRM Core.exe'
          Copy-Item build/bin/PawnIO_setup.exe build/output/PawnIO_setup.exe
          Copy-Item -Recurse build/bin/bridge build/output/bridge
          if (Test-Path 'build/bin/THRM-amd64-installer.exe') {
            Copy-Item 'build/bin/THRM-amd64-installer.exe' 'build/output/THRM-amd64-installer.exe'
          }
          Compress-Archive -Path build/output/* -DestinationPath build/bin/THRM-windows-portable.zip -Force

      - name: Upload PR artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: THRM-windows-${{ github.event.pull_request.number }}
          path: |
            build/bin/THRM-amd64-installer.exe
            build/bin/THRM-windows-portable.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload branch artifacts
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@v4
        with:
          name: THRM-windows-${{ github.sha }}
          path: |
            build/bin/THRM-amd64-installer.exe
            build/bin/THRM-windows-portable.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload Windows release assets
        if: needs.prepare-release.outputs.should_publish_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            build/bin/THRM-amd64-installer.exe
            build/bin/THRM-windows-portable.zip
          if-no-files-found: error
          retention-days: 1

  build-linux:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libhidapi-dev libudev-dev

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/package.json', 'frontend/bun.lock', 'frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Build THRM (Linux)
        env:
          THRM_BUILD_VERSION: ${{ needs.prepare-release.outputs.build_version }}
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Package Linux artifacts (tar.gz + .deb)
        shell: bash
        env:
          THRM_BUILD_VERSION: ${{ needs.prepare-release.outputs.build_version }}
        run: |
          set -euo pipefail

          VER="${THRM_BUILD_VERSION:-}"
          if [ -z "$VER" ]; then
            VER=$(grep -oE '"productVersion"[[:space:]]*:[[:space:]]*"[^"]+"' wails.json | sed -E 's/.*"([^"]+)"$/\1/')
          fi
          [ -n "$VER" ] || VER="dev"
          echo "Packaging version: $VER"

          ICON_SRC="frontend/public/brand/appicon.png"
          RULES_SRC="scripts/99-flydigi-fan.rules"
          DIST="build/dist"
          rm -rf "$DIST" build/stage build/deb
          mkdir -p "$DIST"

          # ---------- Portable tarball ----------
          STAGE="build/stage/THRM-linux-amd64"
          mkdir -p "$STAGE"
          install -Dm755 build/thrm "$STAGE/thrm"
          install -Dm755 build/thrm-core "$STAGE/thrm-core"
          install -Dm755 scripts/install-portable.sh "$STAGE/install.sh"
          [ -f "$RULES_SRC" ] && install -Dm644 "$RULES_SRC" "$STAGE/99-flydigi-fan.rules"
          [ -f "$ICON_SRC" ] && install -Dm644 "$ICON_SRC" "$STAGE/appicon.png"
          tar -czf "$DIST/THRM-linux-amd64-portable.tar.gz" -C build/stage THRM-linux-amd64
          echo "Created $DIST/THRM-linux-amd64-portable.tar.gz"

          # ---------- Debian package ----------
          case "$VER" in
            nightly-*) DEB_VER="0.0.0~${VER#nightly-}" ;;
            v*|V*)     DEB_VER="${VER#[vV]}" ;;
            *)         DEB_VER="$VER" ;;
          esac
          echo "Debian version: $DEB_VER"

          PKGROOT="build/deb/thrm"
          install -Dm755 build/thrm "$PKGROOT/usr/bin/thrm"
          install -Dm755 build/thrm-core "$PKGROOT/usr/bin/thrm-core"
          [ -f "$ICON_SRC" ] && install -Dm644 "$ICON_SRC" "$PKGROOT/usr/share/icons/hicolor/256x256/apps/thrm.png"
          [ -f "$RULES_SRC" ] && install -Dm644 "$RULES_SRC" "$PKGROOT/lib/udev/rules.d/99-flydigi-fan.rules"

          install -d "$PKGROOT/usr/share/applications"
          cat > "$PKGROOT/usr/share/applications/thrm.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=THRM Fan Control
          Comment=Flydigi BS Series Fan Controller
          Exec=/usr/bin/thrm
          Icon=thrm
          Terminal=false
          Categories=Utility;
          EOF

          install -d "$PKGROOT/DEBIAN"
          cat > "$PKGROOT/DEBIAN/control" << EOF
          Package: thrm
          Version: $DEB_VER
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0, libhidapi-hidraw0
          Recommends: bluez
          Maintainer: TIANLI0 <wutianli@tianli0.top>
          Description: THRM Fan Control
           Flydigi BS series cooler and multi-brand fan controller.
          EOF

          cat > "$PKGROOT/DEBIAN/postinst" << 'EOF'
          #!/bin/sh
          set -e
          if command -v udevadm >/dev/null 2>&1; then
            udevadm control --reload-rules || true
            udevadm trigger || true
          fi
          exit 0
          EOF
          chmod 0755 "$PKGROOT/DEBIAN/postinst"

          dpkg-deb --build --root-owner-group "$PKGROOT" "$DIST/thrm_${DEB_VER}_amd64.deb"
          echo "Created $DIST/thrm_${DEB_VER}_amd64.deb"

          ls -lh "$DIST"

      - name: Upload PR artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: THRM-linux-${{ github.event.pull_request.number }}
          path: |
            build/dist/*.tar.gz
            build/dist/*.deb
          if-no-files-found: error
          retention-days: 14

      - name: Upload branch artifacts
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
        uses: actions/upload-artifact@v4
        with:
          name: THRM-linux-${{ github.sha }}
          path: |
            build/dist/*.tar.gz
            build/dist/*.deb
          if-no-files-found: error
          retention-days: 7

      - name: Upload Linux release assets
        if: needs.prepare-release.outputs.should_publish_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            build/dist/*.tar.gz
            build/dist/*.deb
          if-no-files-found: error
          retention-days: 1

  publish-release:
    needs: [prepare-release, build-windows, build-linux]
    if: needs.prepare-release.outputs.should_publish_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows release assets
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: dist/windows

      - name: Download Linux release assets
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: dist/linux

      - name: Prepare release notes context
        id: release_context
        shell: pwsh
        env:
          RELEASE_TYPE: ${{ needs.prepare-release.outputs.release_type }}
          REPO_NAME: ${{ github.repository }}
          RELEASE_NAME: ${{ needs.prepare-release.outputs.release_name }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          RELEASE_LABEL: ${{ needs.prepare-release.outputs.release_label }}
          RELEASE_DATE: ${{ needs.prepare-release.outputs.release_date }}
          RELEASE_GUIDANCE: ${{ needs.prepare-release.outputs.release_guidance }}
          TARGET_COMMITISH: ${{ needs.prepare-release.outputs.target_commitish }}
          PREVIOUS_STABLE_TAG: ${{ needs.prepare-release.outputs.previous_stable_tag }}
        run: |
          $ErrorActionPreference = 'Stop'

          New-Item -ItemType Directory -Force -Path build/release-context | Out-Null

          $releaseType = $env:RELEASE_TYPE
          $compareSummary = ''
          $commitLines = @()
          $fileLines = @()
          $rawFileLines = @()
          $aiScopedCommitLines = @()
          $aiScopedFileLines = @()
          $codeContextLines = @()
          $rangeSpec = ''
          $allowedSourceFilePattern = '(?i)\.(go|tsx|ts|cs|csproj|nsi)$'
          $allowedPathspecs = @(
            ':(glob)**/*.go',
            ':(glob)**/*.ts',
            ':(glob)**/*.tsx',
            ':(glob)**/*.cs',
            ':(glob)**/*.csproj',
            ':(glob)**/*.nsi'
          )

          if ($releaseType -eq 'stable') {
            $currentTag = $env:RELEASE_TAG
            $previousTag = (git describe --tags --abbrev=0 "$currentTag^" 2>$null)
            if ($LASTEXITCODE -ne 0) {
              $previousTag = ''
            }
            $previousTag = "$previousTag".Trim()

            if ([string]::IsNullOrWhiteSpace($previousTag)) {
              $compareSummary = "Formal release $currentTag; no earlier tag was found, so the notes should be based on the currently visible recent commits for this tag."
              $commitLines = @(git log $currentTag --pretty=format:"- %h %s (%an, %ad)" --date=short --max-count=60)
              $fileLines = @(git log $currentTag --name-only --pretty=format: --max-count=60 | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Sort-Object -Unique)
              $rangeSpec = "$currentTag"
            } else {
              $range = "$previousTag..$currentTag"
              $compareSummary = "Formal release $currentTag; change range $range."
              $commitLines = @(git log $range --pretty=format:"- %h %s (%an, %ad)" --date=short --max-count=60)
              $fileLines = @(git log $range --name-only --pretty=format: --max-count=60 | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Sort-Object -Unique)
              $rangeSpec = "$range"
            }
          } else {
            $previousStableTag = "$($env:PREVIOUS_STABLE_TAG)".Trim()
            $currentRef = "$($env:TARGET_COMMITISH)".Trim()
            if ([string]::IsNullOrWhiteSpace($currentRef)) {
              $currentRef = 'HEAD'
            }

            if ([string]::IsNullOrWhiteSpace($previousStableTag)) {
              $compareSummary = "Preview pre-release $($env:RELEASE_TAG); no earlier formal release tag was found, so the notes cover the currently visible recent commits."
              $commitLines = @(git log $currentRef --pretty=format:"- %h %s (%an, %ad)" --date=short --max-count=100)
              $fileLines = @(git log $currentRef --name-only --pretty=format: --max-count=100 | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Sort-Object -Unique)
              $rangeSpec = "$currentRef"
            } else {
              $range = "$previousStableTag..$currentRef"
              $compareSummary = "Preview pre-release $($env:RELEASE_TAG) covering all changes since the last formal release $previousStableTag (change range $range)."
              $commitLines = @(git log $range --pretty=format:"- %h %s (%an, %ad)" --date=short --max-count=100)
              $fileLines = @(git log $range --name-only --pretty=format: --max-count=100 | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Sort-Object -Unique)
              $rangeSpec = "$range"
            }
          }

          if (-not $commitLines -or $commitLines.Count -eq 0) {
            $commitLines = @('- No commit list could be extracted. Summarize conservatively from the release scope only.')
          }

          if (-not $fileLines -or $fileLines.Count -eq 0) {
            $rawFileLines = @()
            $fileLines = @('- No file list could be extracted.')
          } else {
            $rawFileLines = @($fileLines)
            $fileLines = $fileLines | ForEach-Object { "- $_" }
          }

          $allCommitLines = @($commitLines)
          $nonUserFacingPathPattern = '^(?:\.github/|\.vscode/|scripts/|ota/|temp/|build/CMakeFiles/|bridge/TempBridge/(?:obj|bin)/|internal/(?:deviceproto|ipc|logger|record|types|version|plugins|hotkey|powernotify|appmeta)/|cmd/watchdog/|libmake/|docs/assets/)'
          $nonUserFacingFilePattern = '(?i)\.md$'

          $commitHasUserVisibleFiles = @{}
          foreach ($line in $allCommitLines) {
            $m = [System.Text.RegularExpressions.Regex]::Match($line, '^-\s+([0-9a-f]+)\s+')
            if (-not $m.Success) {
              continue
            }

            $shortHash = $m.Groups[1].Value
            $changedInCommit = @(git show --pretty=format: --name-only $shortHash | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Sort-Object -Unique)
            $effectiveInCommit = @(
              $changedInCommit | Where-Object {
                ($_ -notmatch $nonUserFacingPathPattern) -and
                ($_ -notmatch $nonUserFacingFilePattern)
              }
            )
            $commitHasUserVisibleFiles[$shortHash] = ($effectiveInCommit.Count -gt 0)
          }

          $nonUserFacingCommitPattern = '(?i)^-\s+[0-9a-f]+\s+(?:chore|ci|build|test|tests|refactor|style|perf|docs|revert)(?:\([^)]+\))?:'
          $internalNoiseKeywordPattern = '(?i)(workflow|pipeline|lint|format|typo|internal only|debug log|telemetry|deps only|dependency bump|no user impact)'
          $userVisibleCommitLines = @(
            $allCommitLines | Where-Object {
              $m = [System.Text.RegularExpressions.Regex]::Match($_, '^-\s+([0-9a-f]+)\s+')
              $hasEffectiveFiles = $true
              if ($m.Success -and $commitHasUserVisibleFiles.ContainsKey($m.Groups[1].Value)) {
                $hasEffectiveFiles = [bool]$commitHasUserVisibleFiles[$m.Groups[1].Value]
              }

              $hasEffectiveFiles -and
              ($_ -notmatch $nonUserFacingCommitPattern) -and
              ($_ -notmatch $internalNoiseKeywordPattern)
            }
          )

          if (-not $userVisibleCommitLines -or $userVisibleCommitLines.Count -eq 0) {
            $userVisibleCommitLines = @('- No clearly user-visible changes could be confirmed from commit subjects. Keep notes minimal and do not infer hidden/internal changes.')
          }

          $userVisibleRawFiles = @(
            $rawFileLines | Where-Object {
              -not [string]::IsNullOrWhiteSpace($_) -and
              ($_ -notmatch $nonUserFacingPathPattern) -and
              ($_ -notmatch $nonUserFacingFilePattern)
            }
          )
          $userVisibleFileLines = @()
          if (-not $userVisibleRawFiles -or $userVisibleRawFiles.Count -eq 0) {
            $userVisibleFileLines = @('- No clearly user-visible file changes could be confirmed. Do not list internal-only scope.')
          } else {
            $userVisibleFileLines = $userVisibleRawFiles | ForEach-Object { "- $_" }
          }

          $aiScopedRawFiles = @(
            $rawFileLines | Where-Object {
              -not [string]::IsNullOrWhiteSpace($_) -and
              ($_ -match $allowedSourceFilePattern)
            } | Sort-Object -Unique
          )

          if (-not $aiScopedRawFiles -or $aiScopedRawFiles.Count -eq 0) {
            $aiScopedFileLines = @('- No changed files matched allowed source extensions (.go/.tsx/.ts/.cs/.csproj/.nsi).')
          } else {
            $aiScopedFileLines = $aiScopedRawFiles | ForEach-Object { "- $_" }
          }

          $commitHasAllowedFiles = @{}
          foreach ($line in $allCommitLines) {
            $m = [System.Text.RegularExpressions.Regex]::Match($line, '^-\s+([0-9a-f]+)\s+')
            if (-not $m.Success) {
              continue
            }

            $shortHash = $m.Groups[1].Value
            $changedInCommit = @(git show --pretty=format: --name-only $shortHash | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Sort-Object -Unique)
            $allowedInCommit = @(
              $changedInCommit | Where-Object {
                $_ -match $allowedSourceFilePattern
              }
            )
            $commitHasAllowedFiles[$shortHash] = ($allowedInCommit.Count -gt 0)
          }

          $aiScopedCommitLines = @(
            $allCommitLines | Where-Object {
              $m = [System.Text.RegularExpressions.Regex]::Match($_, '^-\s+([0-9a-f]+)\s+')
              if (-not $m.Success) {
                return $false
              }
              $shortHash = $m.Groups[1].Value
              $commitHasAllowedFiles.ContainsKey($shortHash) -and [bool]$commitHasAllowedFiles[$shortHash]
            }
          )

          if (-not $aiScopedCommitLines -or $aiScopedCommitLines.Count -eq 0) {
            $aiScopedCommitLines = @('- No commits touched allowed source extensions in this release scope.')
          }

          $codeCommitHashes = @()
          if (-not [string]::IsNullOrWhiteSpace($rangeSpec)) {
            $codeCommitHashes = @(git log $rangeSpec --pretty=format:%H --max-count=60)
          }

          $maxCodeContextChars = 28000
          $codeContextCharCount = 0
          foreach ($hash in $codeCommitHashes) {
            if ([string]::IsNullOrWhiteSpace($hash)) {
              continue
            }

            $patchLines = @(git show --no-color --unified=3 --pretty=format:"commit %H %s" $hash -- $allowedPathspecs)
            if ($LASTEXITCODE -ne 0 -or -not $patchLines -or $patchLines.Count -eq 0) {
              continue
            }

            $patchText = ($patchLines -join [Environment]::NewLine).Trim()
            if ([string]::IsNullOrWhiteSpace($patchText)) {
              continue
            }

            if (($codeContextCharCount + $patchText.Length) -gt $maxCodeContextChars) {
              $codeContextLines += '- Code diff context was truncated to keep prompt size manageable.'
              break
            }

            $codeContextLines += $patchText
            $codeContextLines += ''
            $codeContextCharCount += $patchText.Length
          }

          if (-not $codeContextLines -or $codeContextLines.Count -eq 0) {
            $codeContextLines = @('- No diff hunks were available for allowed source extensions in this release scope.')
          }

          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::WriteAllLines((Join-Path $PWD 'build/release-context/commits.txt'), $commitLines, $utf8NoBom)
          [System.IO.File]::WriteAllLines((Join-Path $PWD 'build/release-context/files.txt'), $fileLines, $utf8NoBom)
          [System.IO.File]::WriteAllLines((Join-Path $PWD 'build/release-context/user-visible-commits.txt'), $userVisibleCommitLines, $utf8NoBom)
          [System.IO.File]::WriteAllLines((Join-Path $PWD 'build/release-context/user-visible-files.txt'), $userVisibleFileLines, $utf8NoBom)
          [System.IO.File]::WriteAllLines((Join-Path $PWD 'build/release-context/ai-commits.txt'), $aiScopedCommitLines, $utf8NoBom)
          [System.IO.File]::WriteAllLines((Join-Path $PWD 'build/release-context/ai-files.txt'), $aiScopedFileLines, $utf8NoBom)
          [System.IO.File]::WriteAllLines((Join-Path $PWD 'build/release-context/code-context.txt'), $codeContextLines, $utf8NoBom)

          # Scalar prompt variables are written to files so actions/ai-inference file_input
          # can bind them without any YAML-escaping concerns.
          [System.IO.File]::WriteAllText((Join-Path $PWD 'build/release-context/repo-name.txt'), "$($env:REPO_NAME)", $utf8NoBom)
          [System.IO.File]::WriteAllText((Join-Path $PWD 'build/release-context/release-name.txt'), "$($env:RELEASE_NAME)", $utf8NoBom)
          [System.IO.File]::WriteAllText((Join-Path $PWD 'build/release-context/release-tag.txt'), "$($env:RELEASE_TAG)", $utf8NoBom)
          [System.IO.File]::WriteAllText((Join-Path $PWD 'build/release-context/release-label.txt'), "$($env:RELEASE_LABEL)", $utf8NoBom)
          [System.IO.File]::WriteAllText((Join-Path $PWD 'build/release-context/release-date.txt'), "$($env:RELEASE_DATE)", $utf8NoBom)
          [System.IO.File]::WriteAllText((Join-Path $PWD 'build/release-context/release-guidance.txt'), "$($env:RELEASE_GUIDANCE)", $utf8NoBom)
          [System.IO.File]::WriteAllText((Join-Path $PWD 'build/release-context/compare-summary.txt'), "$compareSummary", $utf8NoBom)

      - name: Generate AI release notes
        id: ai_release_notes
        continue-on-error: true
        uses: actions/ai-inference@v2
        with:
          prompt-file: .github/prompts/release-notes.prompt.yml
          model: ${{ vars.DEEPSEEK_RELEASE_NOTES_MODEL || 'deepseek-v4-flash' }}
          endpoint: ${{ vars.DEEPSEEK_API_BASE_URL || 'https://api.deepseek.com' }}
          token: ${{ secrets.DEEPSEEK_API_KEY }}
          max-completion-tokens: 1800
          file_input: |
            repo_name: build/release-context/repo-name.txt
            release_name: build/release-context/release-name.txt
            release_tag: build/release-context/release-tag.txt
            release_label: build/release-context/release-label.txt
            release_date: build/release-context/release-date.txt
            compare_summary: build/release-context/compare-summary.txt
            release_guidance: build/release-context/release-guidance.txt
            commit_summary: build/release-context/ai-commits.txt
            changed_files: build/release-context/ai-files.txt
            code_context: build/release-context/code-context.txt

      - name: Finalize release notes
        id: finalize_notes
        shell: pwsh
        env:
          AI_RESPONSE_FILE: ${{ steps.ai_release_notes.outputs.response-file }}
          RELEASE_NAME: ${{ needs.prepare-release.outputs.release_name }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          RELEASE_DATE: ${{ needs.prepare-release.outputs.release_date }}
        run: |
          $ErrorActionPreference = 'Stop'

          function New-FallbackNotes {
            param(
              [string]$ReleaseName,
              [string]$ReleaseTag,
              [string]$ReleaseDate,
              [string[]]$CommitLines,
              [string[]]$FileLines
            )

            $lines = @(
              "本次更新主要为日常维护与稳定性改进。",
              "This update mainly contains routine maintenance and stability improvements.",
              '',
              '## 更新亮点 / Highlights',
              '- 本次无明显的新功能变化 / No notable new features in this build.',
              '',
              '## 修复与改进 / Fixes and Improvements',
              '- 常规维护与稳定性优化 / General maintenance and stability improvements.'
            )

            return (($lines -join [Environment]::NewLine).Trim() + [Environment]::NewLine)
          }

          $requiredHeadings = @(
            '## 更新亮点 / Highlights',
            '## 修复与改进 / Fixes and Improvements'
          )

          $notes = ''
          $aiFile = $env:AI_RESPONSE_FILE

          if (-not [string]::IsNullOrWhiteSpace($aiFile) -and (Test-Path $aiFile)) {
            $candidate = (Get-Content $aiFile -Raw).Trim()
            $isValid = -not [string]::IsNullOrWhiteSpace($candidate)
            foreach ($heading in $requiredHeadings) {
              if ($candidate -notmatch [System.Text.RegularExpressions.Regex]::Escape($heading)) {
                $isValid = $false
              }
            }

            if ($isValid) {
              $notes = $candidate
            } else {
              Write-Warning 'AI release notes were empty or missing required headings. Falling back to conservative local notes.'
            }
          } else {
            Write-Warning 'No AI release notes response file was produced. Falling back to conservative local notes.'
          }

          if ([string]::IsNullOrWhiteSpace($notes)) {
            $fallbackCommitLines = @(Get-Content 'build/release-context/ai-commits.txt')
            $fallbackFileLines = @(Get-Content 'build/release-context/ai-files.txt')
            $notes = New-FallbackNotes -ReleaseName $env:RELEASE_NAME -ReleaseTag $env:RELEASE_TAG -ReleaseDate $env:RELEASE_DATE -CommitLines $fallbackCommitLines -FileLines $fallbackFileLines
          }

          $notesRelativePath = 'build/release-context/release-notes.md'
          $notesFullPath = Join-Path $PWD $notesRelativePath
          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::WriteAllText($notesFullPath, $notes.Trim() + [Environment]::NewLine, $utf8NoBom)

          "notes_path=$notesRelativePath" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.prepare-release.outputs.release_name }}
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          target_commitish: ${{ needs.prepare-release.outputs.target_commitish }}
          prerelease: ${{ needs.prepare-release.outputs.is_prerelease }}
          body_path: ${{ steps.finalize_notes.outputs.notes_path }}
          files: |
            dist/windows/*
            dist/linux/*
