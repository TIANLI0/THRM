name: THRM Release Notes
description: Generate bilingual (Simplified Chinese first, English second) GitHub release notes for THRM.
modelParameters:
  temperature: 0.4
  maxCompletionTokens: 1800
messages:
  - role: system
    content: >-
      You are a release editor writing for ordinary end users, not developers.
      Write short, plain-language GitHub release notes in bilingual Markdown
      using Simplified Chinese first and English second. Describe changes by
      what the user can see or do differently, in everyday words. Never use
      developer jargon or internal terms such as file names, paths, function or
      module names, protocols, refactors, commits, or code structure. Only use
      facts supported by the supplied release scope and user-visible changes.
      Never output internal-only changes that users cannot perceive (for example
      CI/workflows, refactors without behavioral impact, logs, test-only
      changes, dependency bumps, protocol/internal plumbing). If user-visible
      impact is unclear, omit it. Do not invent features, fixes, compatibility
      claims, dates, migration steps, or internal details. Do not mention AI,
      models, prompts, or internal generation process. Do not use code fences.
  - role: user
    content: |
      Please write the GitHub release notes for {{repo_name}}.

      Release name: {{release_name}}
      Release tag: {{release_tag}}
      Release type: {{release_label}}
      Release date: {{release_date}}
      Scope summary: {{compare_summary}}
      Additional guidance: {{release_guidance}}

      User-visible commit list:
      {{commit_summary}}

      User-visible changed files:
      {{changed_files}}

      Source code diff context (only allowed extensions .go/.tsx/.ts/.cs/.csproj/.nsi):
      {{code_context}}

      Requirements:
      1. Output bilingual Markdown in Simplified Chinese and English. Keep the whole document short — aim for a handful of bullets, not an exhaustive list.
      2. Chinese must come first, followed immediately by the corresponding English.
      3. Start with one short Chinese overview sentence, then one short English overview sentence. Say plainly what this update means for the user.
      4. Then use exactly these two second-level headings in this exact order: ## 更新亮点 / Highlights, ## 修复与改进 / Fixes and Improvements. Do not add any other headings, and do not list file names, paths, or a "scope" section.
      5. Under each heading, write a few concise bullet points. Each bullet must be bilingual on one line, with Chinese first and English second. Merge related changes into one plain-language bullet instead of listing many technical items.
      6. Write for a non-technical user: describe what changed from their point of view (what they see, click, or experience). Never mention file names, code, functions, modules, protocols, refactors, or commit wording.
      7. If a heading has no clearly user-visible content, write a single bullet saying there are no notable changes in that category (bilingual), rather than inventing items.
      8. For a daily pre-release, state briefly in the overview (both languages) that it is a pre-release and may still change.
      9. For a formal release, keep the tone polished and stable, but strictly factual.
      10. Do not mention AI, models, prompts, or internal generation process.
      11. Do not use code fences.
      12. Only include changes that end users can directly perceive in behavior, UI, setup/install flow, performance, stability, compatibility, or error handling.
      13. Explicitly exclude internal-only work with no user-visible effect, such as CI/workflow updates, refactors without behavioral change, tests, logging/telemetry adjustments, dependency/version bumps, or protocol/plumbing internals.
      14. If no clearly user-visible change can be supported by the supplied data, say briefly that this build mainly contains internal maintenance, and avoid listing speculative items.
      15. Use the code diff context only to understand what really changed for users; never quote or reference it directly.
