template: |
  Please write the GitHub release notes for {{repo_name}}.

  Release name: {{release_name}}
  Release tag: {{release_tag}}
  Release type: {{release_label}}
  Release date: {{release_date}}
  Scope summary: {{compare_summary}}
  Additional guidance: {{release_guidance}}

  User-visible commit list:
  {{commit_summary}}

  User-visible changed files:
  {{changed_files}}

  Requirements:
  1. Output bilingual Markdown in Simplified Chinese and English.
  2. Chinese must come first, followed immediately by the corresponding English.
  3. Start with one short Chinese overview paragraph, then one short English overview paragraph.
  4. Then use these second-level headings in this exact order: ## 亮点 / Highlights, ## 修复与改进 / Fixes and Improvements, ## 涉及范围 / Scope, ## 使用提示 / Notes.
  5. Under each heading, write concise bullet points. Each bullet must be bilingual on one line, with Chinese first and English second.
  6. If the commit data does not clearly support a statement, keep it conservative and explicitly say it is based on visible commits.
  7. For a daily pre-release, clearly state in both Chinese and English that it is a pre-release and may continue to change.
  8. For a formal release, keep the tone polished and stable, but strictly factual.
  9. Do not mention AI, models, prompts, or internal generation process.
  10. Do not use code fences.
  11. Only include changes that end users can directly perceive in behavior, UI, setup/install flow, performance, stability, compatibility, or error handling.
  12. Explicitly exclude internal-only work with no user-visible effect, such as CI/workflow updates, refactors without behavioral change, tests, logging/telemetry adjustments, dependency/version bumps, or protocol/plumbing internals.
  13. If no clearly user-visible change can be supported by the supplied data, state that this build mainly includes internal maintenance and avoid listing speculative items.